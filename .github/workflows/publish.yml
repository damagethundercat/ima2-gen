name: Publish npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish @damagethundercat/ima2-gen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Check published npm version
        id: npm-version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"

          if npm view "@damagethundercat/ima2-gen@$package_version" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "@damagethundercat/ima2-gen@$package_version is already published; skipping npm publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "@damagethundercat/ima2-gen@$package_version is not published yet; continuing."
          fi
      - name: Install root deps
        if: steps.npm-version.outputs.already_published != 'true'
        run: npm ci
      - name: Install ui deps
        if: steps.npm-version.outputs.already_published != 'true'
        run: npm --prefix ui install --no-audit --no-fund
      - name: Verify package
        if: steps.npm-version.outputs.already_published != 'true'
        run: npm run prepublishOnly
      - name: Publish
        if: steps.npm-version.outputs.already_published != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
